# Docker Compose для KPPDF CRM v6 Phase 1 Bootstrap
# 3 сервиса: postgres-16-alpine + Next.js app + nginx (reverse proxy)
# Согласовано: СТЕК-ПРЕДПИСАНИЕ.md §5 «Docker Compose для Synology DSM» (OQ-3)
# Использование: cp docker-compose.example.yml docker-compose.yml и заполнить .env

services:
  postgres:
    image: postgres:16-alpine
    container_name: kppdf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kppdf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kppdf_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-kppdf_v6}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kppdf}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - kppdf-net

  app:
    image: kppdf-crm-v6:latest
    container_name: kppdf-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kppdf}:${POSTGRES_PASSWORD:-kppdf_dev_password}@postgres:5432/${POSTGRES_DB:-kppdf_v6}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - kppdf-net

  nginx:
    image: nginx:1.27-alpine
    container_name: kppdf-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - kppdf-net

volumes:
  postgres-data:
    driver: local

networks:
  kppdf-net:
    driver: bridge
